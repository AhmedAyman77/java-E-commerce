spring:
    application:
        name: ecommerce

    datasource:
        url: ${DATABASE_URL}
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
    
        hibernate:
            # Possible values: create, create-drop, validate, update, none
            ddl-auto: create
    
        show-sql: true
    
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect